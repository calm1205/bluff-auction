services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${SERVER_PORT}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    develop:
      watch:
        - action: sync
          path: ./packages/server/src
          target: /app/packages/server/src
        - action: sync
          path: ./packages/shared/src
          target: /app/packages/shared/src
        - action: rebuild
          path: ./packages/server/package.json
        - action: rebuild
          path: ./packages/shared/package.json
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    environment:
      VITE_SERVER_URL: ${VITE_SERVER_URL}
    ports:
      - "${CLIENT_PORT}:5173"
    depends_on:
      - server
    develop:
      watch:
        - action: sync
          path: ./packages/client/src
          target: /app/packages/client/src
        - action: sync
          path: ./packages/client/index.html
          target: /app/packages/client/index.html
        - action: sync
          path: ./packages/shared/src
          target: /app/packages/shared/src
        - action: rebuild
          path: ./packages/client/package.json
        - action: rebuild
          path: ./packages/shared/package.json
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json

volumes:
  postgres_data:
