services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bluff
      POSTGRES_USER: bluff
      POSTGRES_PASSWORD: bluff
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluff -d bluff"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      DATABASE_URL: postgres://bluff:bluff@postgres:5432/bluff
      PORT: "4000"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      args:
        VITE_SERVER_URL: http://localhost:4000
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
